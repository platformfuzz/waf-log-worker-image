name: CI CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"

env:
  GO_VERSION: "1.24"
  KO_DOCKER_REPO: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write
  statuses: write
  packages: write

jobs:
  golangci-lint:
    uses: actionsforge/actions-golangci-lint/.github/workflows/golangci-lint.yml@v0

  govulncheck:
    uses: actionsforge/actions-govulncheck/.github/workflows/govulncheck.yml@v0

  test:
    uses: actionsforge/actions-go-test/.github/workflows/go-test.yml@v0
    with:
      test-pattern: "./..."

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain)" ]; then
            echo "go.mod or go.sum has uncommitted changes"
            git diff
            exit 1
          fi

      - name: Build binary
        run: go build -v ./cmd/waf-worker

  build-image:
    needs: [validate, golangci-lint, govulncheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install ko
        uses: ko-build/setup-ko@v0.8

      - name: Build image locally with ko
        run: ko build ./cmd/waf-worker --platform=linux/amd64 --local

  build-and-push:
    needs: [build-image]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ko
        uses: ko-build/setup-ko@v0.8

      - name: Compute tags
        id: tags
        run: |
          SHA_TAG="$(git rev-parse --short=12 HEAD)"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push by ko
        run: |
          ko build ./cmd/waf-worker --platform=linux/amd64,linux/arm64 --tags "${{ steps.tags.outputs.sha_tag }}" --bare
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            ko build ./cmd/waf-worker --platform=linux/amd64,linux/arm64 --tags latest --bare
          fi
          if [[ -n "${{ steps.tags.outputs.version_tag }}" ]]; then
            ko build ./cmd/waf-worker --platform=linux/amd64,linux/arm64 --tags "${{ steps.tags.outputs.version_tag }}" --bare
          fi
